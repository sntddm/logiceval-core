spring:
  application:
    name: logic-fallacies

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/logiceval_db}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate # Strict verification mode against migration tracking
    properties:
      hibernate:
        jdbc:
          batch_size: 20 # Optimizes multi-row vector payload inserts

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  mvc:
    apiversion:
      default: "1.0"
      supported: "1.0, 2.0"
      detect-supported: true
      use:
        header: "X-API-Version"

  graphql:
    graphiql:
      enabled: true

  ai:
    ollama:
      api-key: "ollama-local-dummy"
      chat:
        base-url: ${OLLAMA_CHAT_BASE_URL:http://localhost:11434/v1}
        model: llama3.2:1b
        temperature: 0.0 # Low variance prevents deterministic creative delays
        num_predict: 300 # Bounds response window sizes for consistent low latency
      embedding:
        base-url: ${OLLAMA_EMBEDDING_BASE_URL:http://localhost:11434/v1}
        model: nomic-embed-text:latest
    vectorstore:
      pgvector:
        database-name: "logiceval_db"
        table-name: "fallacy_vector_store"
        index-type: HNSW # High-performance proximity search matching
        dimensions: 768 # Target footprint dimension for nomic-embed-text

  security:
    oauth2:
      resourceserver:
        jwt:
          public-key-location: classpath:app-public.pem # Self-contained verification signature
          private-key-location: classpath:app-private.pem # Internal authorization signing link

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
    tags-sorter: alpha
  paths-to-match: /api/**
